<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Claude iOS stale session reset flow</title>
  <desc id="desc">iPhone sends Claude traffic through Charles on Mac. Charles rewrites the account request response to session expired and expires local cookies.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#193333" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg{fill:#f7faf8}
      .card{fill:#fff;stroke:#d9e3df;stroke-width:2;filter:url(#shadow)}
      .accent{fill:#0f766e}
      .warn{fill:#b45309}
      .muted{fill:#60706d}
      .title{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#173331}
      .body{font:500 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#243b39}
      .small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#60706d}
      .code{font:600 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#12302d}
      .line{stroke:#2f4f4f;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#b45309;stroke-width:4;fill:none;stroke-dasharray:10 10;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text x="60" y="70" class="title">Charles 清理 Claude iOS 旧 session 的核心流程</text>
  <text x="60" y="106" class="small">不是破解账号；只是让 App 收到“会话过期”，从而删除本机卡住的旧登录态。</text>

  <rect x="70" y="165" width="260" height="250" rx="22" class="card"/>
  <circle cx="200" cy="225" r="42" fill="#e0f2f1"/>
  <rect x="174" y="190" width="52" height="88" rx="13" fill="#0f766e"/>
  <rect x="184" y="202" width="32" height="56" rx="4" fill="#f7faf8"/>
  <circle cx="200" cy="267" r="4" fill="#f7faf8"/>
  <text x="200" y="325" text-anchor="middle" class="body">iPhone Claude App</text>
  <text x="200" y="356" text-anchor="middle" class="small">Wi-Fi 代理到 Mac</text>
  <text x="200" y="384" text-anchor="middle" class="code">192.168.x.x:8888</text>

  <rect x="470" y="145" width="285" height="290" rx="22" class="card"/>
  <circle cx="612" cy="212" r="45" fill="#ecfdf5"/>
  <path d="M574 224 h76 a20 20 0 0 0 0-40 h-8 a34 34 0 0 0-66-8 a25 25 0 0 0-2 48z" fill="#10b981"/>
  <text x="612" y="295" text-anchor="middle" class="body">Mac 上的 Charles</text>
  <text x="612" y="326" text-anchor="middle" class="small">只拦截关键路径</text>
  <text x="612" y="355" text-anchor="middle" class="code">https://claude.ai:443</text>
  <text x="612" y="383" text-anchor="middle" class="code">/api/account*</text>

  <rect x="900" y="165" width="240" height="250" rx="22" class="card"/>
  <circle cx="1020" cy="225" r="42" fill="#fef3c7"/>
  <path d="M984 236 h72 l-36-62z" fill="#f59e0b"/>
  <text x="1020" y="231" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">401</text>
  <text x="1020" y="325" text-anchor="middle" class="body">Claude API</text>
  <text x="1020" y="356" text-anchor="middle" class="small">App 认为会话过期</text>
  <text x="1020" y="384" text-anchor="middle" class="small">回到重新登录</text>

  <path d="M335 290 C390 290 410 290 460 290" class="line"/>
  <text x="397" y="262" text-anchor="middle" class="small">请求经过代理</text>

  <path d="M760 290 C820 290 835 290 890 290" class="dash"/>
  <text x="825" y="252" text-anchor="middle" class="small">Rewrite 响应</text>
  <text x="825" y="278" text-anchor="middle" class="code">401 session_expired</text>

  <rect x="150" y="485" width="900" height="70" rx="18" fill="#ffffff" stroke="#d9e3df" stroke-width="2"/>
  <text x="185" y="528" class="small">Charles 同时返回两个过期 Set-Cookie：</text>
  <text x="500" y="528" class="code">sessionKey=; routingHint=;</text>
  <text x="755" y="528" class="small">让 iOS 删除旧登录残留。</text>
</svg>

